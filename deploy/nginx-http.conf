# HTTP-only config — used during initial cert issuance BEFORE SSL is set up.
# After certbot succeeds, swap docker-compose to use nginx.conf instead.
upstream pepatlas_app {
    server app:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name pepatlas.com www.pepatlas.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://pepatlas_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
